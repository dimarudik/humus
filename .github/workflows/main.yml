name: Java CI with Testcontainers
on:
  push:
    branches: [ stable ]

jobs:
 test:
  runs-on: ubuntu-latest
  steps:
   - uses: actions/checkout@v5
   - uses: actions/setup-java@v4
     with:
      java-version: '21'
      distribution: 'temurin'
   - name: Run the Maven verify phase
     run: mvn clean package
